<main class="col-lg-9 col-xl-9">
  <div *ngIf="isLoading" class="loading text-center">
    <p>Loading...</p>
  </div>
  <div *ngIf="error" class="error text-danger text-center">
    <p>{{ error }}</p>
  </div>
  <div *ngIf="!isLoading && !error">
    <article class="card card-product-list" *ngFor="let order of orders">
      <div class="row g-0 align-items-center">
        <aside class="col-xl-3 col-lg-4 col-md-12 col-12 text-center">
          <a routerLink="/products/{{order.cartItems[0]?.productId}}" class="img-wrap">
            <img class="rounded" [src]="order.cartItems[0]?.productImage"
              onerror="this.onerror = null;this.src='assets/images/ImageNotFound.png'">
          </a>
        </aside>
        <div class="col-xl-6 col-lg col-md-7 col-sm-7">
          <div class="card-body">
            <a routerLink="/products/{{order.cartItems[0]?.productId}}" class="title">
              {{ order.cartItems[0]?.productName }}
            </a>
            <div class="rating-wrap mb-2">
              <ul class="rating-stars">
                <li class="stars-active" style="width: 90%;">
                  <img src="assets/images/stars-active.svg" alt="">
                </li>
                <li>
                  <img src="assets/images/starts-disable.svg" alt="">
                </li>
              </ul>
              <span class="label-rating text-warning">4.5</span>
              <i class="dot"></i>
              <span class="label-rating text-muted">{{ getTotalQuantity(order.cartItems) }} items</span>
            </div>
            <p class="text-muted">
              Order placed on {{ order.orderDate | date:'mediumDate' }}
            </p>
            <p class="my-2">
              <span class="tag">Total: ${{ order.totalPrice }}</span>
            </p>
          </div>
        </div>
      </div>
    </article>
  </div>
</main>
